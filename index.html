document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lay: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px;\">\n            <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: #0d6b64;\">STEP 1 · THE TRACE AUDIT<\/div>\n            <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #928a77;\">~2 weeks · no fee<\/span>\n          <\/div>\n          <h3 style=\"font-size: 21px; font-weight: 700; margin: 0 0 12px; color: #262019;\">See what you could save<\/h3>\n          <p style=\"font-size: 15px; line-height: 1.65; color: #6f6857; margin: 0 0 20px;\">We analyze your traces where they live. They never leave your environment. You get back which optimizations pay off.<\/p>\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: #6f6857; background: #edece4; border: 1px solid #dad5cb; border-radius: 4px; padding: 14px 18px; line-height: 1.8;\">\n            <div>▸ never touches your request path<\/div>\n            <div>▸ output: your number, not an industry number<\/div>\n          <\/div>\n        <\/div>\n        <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"background: #f4f3ee; border: 1px solid #d0ccc1; border-radius: 16px; padding: 30px;\">\n          <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px;\">\n            <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: #0d6b64;\">STEP 2 · THE GATEWAY<\/div>\n            <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #928a77;\">in your VPC<\/span>\n          <\/div>\n          <h3 style=\"font-size: 21px; font-weight: 700; margin: 0 0 12px; color: #262019;\">Change one line. Nothing else.<\/h3>\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; background: #1b1912; border: 1px solid #2f2b22; border-radius: 4px; padding: 14px 18px; line-height: 1.9; margin-bottom: 20px;\">\n            <div style=\"color: #ff9db0;\">−&nbsp;&nbsp;base_url: api.provider.com<\/div>\n            <div style=\"color: #7de3a4;\">+&nbsp;&nbsp;base_url: gateway.orizon.internal<\/div>\n          <\/div>\n          <p style=\"font-size: 15px; line-height: 1.65; color: #6f6857; margin: 0;\">If we're ever down, calls go straight to your provider. Every optimization is opt-in, shadow-tested against your agent's own accuracy, and rolled back automatically the moment quality dips.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- 5.0 PRICING -->\n  <div id=\"pricing\" data-screen-label=\"5.0 pricing\" style=\"padding: 96px 56px; border-top: 1px solid #d4d0c6; background: #dedcd2;\">\n    <div class=\"r-split\" style=\"max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;\">\n      <div>\n        <h2 style=\"font-family: 'JetBrains Mono', monospace; font-size: 50px; font-weight: 400; line-height: 1.08; margin: 0 0 18px; color: #262019;\">A share of <em style=\"color: #0d6b64; font-style: normal;\">measured<\/em> savings.<\/h2>\n        <p style=\"font-size: 16.5px; line-height: 1.65; color: #6f6857; margin: 0;\">Measured against a frozen per-task-type baseline, so you never pay us for market-wide price drops. The audit itself: free.<\/p>\n      <\/div>\n      <div data-reveal=\"\" style=\"background: #f4f3ee; border: 1px solid #d0ccc1; border-radius: 16px; padding: 30px;\">\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;\">\n          <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: #928a77;\">YOUR MONTHLY INFERENCE BILL<\/span>\n          <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: #262019;\">{{ billFmt }}<\/span>\n        <\/div>\n        <input type=\"range\" min=\"5000\" max=\"500000\" step=\"5000\" value=\"{{ billVal }}\" sc-camel-on-change=\"{{ onBill }}\" style=\"width: 100%; cursor: pointer;\">\n        <div style=\"display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #a8a08c; margin-top: 4px;\">\n          <span>$5K<\/span><span>$500K<\/span>\n        <\/div>\n        <div style=\"display: grid; gap: 13px; font-family: 'JetBrains Mono', monospace; font-size: 13px; border-top: 1px solid #dbd3bf; margin-top: 22px; padding-top: 20px;\">\n          <div style=\"display: flex; justify-content: space-between;\"><span style=\"color: #6f6857;\">savings found · 67%<\/span><span style=\"color: #0d6b64; font-weight: 600;\">−{{ grossFmt }}<\/span><\/div>\n          <div style=\"display: flex; justify-content: space-between;\"><span style=\"color: #6f6857;\">our fee · 15% of savings<\/span><span style=\"color: #302a20;\">+{{ feeFmt }}<\/span><\/div>\n          <div style=\"display: flex; justify-content: space-between; border-top: 1px solid #dbd3bf; padding-top: 13px;\"><span style=\"color: #262019; font-weight: 600;\">you keep<\/span><span style=\"color: #0d6b64; font-weight: 700;\">{{ netFmt }} / mo<\/span><\/div>\n          <div style=\"display: flex; justify-content: space-between;\"><span style=\"color: #6f6857;\">new bill, all-in<\/span><span style=\"color: #262019; font-weight: 600;\">{{ newBillFmt }} / mo<\/span><\/div>\n        <\/div>\n        <div style=\"border-top: 1px solid #dbd3bf; margin-top: 20px; padding-top: 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #928a77; line-height: 1.7;\">If we don't cut your bill, we don't get paid. That's the whole model.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- 8.0 CTA -->\n  <div id=\"cta\" data-screen-label=\"6.0 cta\" style=\"padding: 104px 56px 56px; border-top: 1px solid #d4d0c6; background: #dedcd2; text-align: center;\">\n    <h2 style=\"font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 400; letter-spacing: -0.01em; margin: 0 0 18px; color: #262019;\">See how much <em style=\"color: #0d6b64; font-style: normal;\">you can<\/em> save.<\/h2>\n    <p style=\"font-size: 17px; color: #6f6857; margin: 0 0 38px;\">Free trace audit. Your traffic. Zero production risk.<\/p>\n    <a href=\"https://cal.com/lohithsai-yadalachanchu-fsyzvu/coffee?overlayCalendar=true\" target=\"_blank\" rel=\"noopener\" style=\"display: inline-block; background: #10756e; color: #f4f3ee; font-size: 16px; font-weight: 700; border-radius: 5px; padding: 16px 34px; transition: background 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;\" style-hover=\"background: #0a5f59; transform: translateY(-2px); box-shadow: 0 12px 28px rgba(16,117,110,0.3);\">Book a demo<\/a>\n    <div style=\"display: flex; justify-content: center; gap: 28px; margin-top: 84px; font-size: 14px; color: #a8a08c;\">\n      <span>© 2026 Orizon<\/span>\n    <\/div>\n  <\/div>\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;headline&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;frontier-twice&quot;, &quot;options&quot;: [&quot;frontier-twice&quot;, &quot;margin-traces&quot;, &quot;resolve-fix&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Hero&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    bill: 50000,\n    stack: { context_pruning: 'live', plan_cache: 'live', step_routing: 'shadow', distilled_expert: 'shadow' }\n  };\n\n  componentDidMount() {\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        const el = e.target;\n        if (e.isIntersecting) {\n          const d = el.getAttribute('data-reveal-delay');\n          if (d) el.style.transitionDelay = d + 'ms';\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n        } else {\n          el.style.transitionDelay = '0ms';\n          el.style.opacity = '0';\n          el.style.transform = 'translateY(28px)';\n        }\n      });\n    }, { rootMargin: '0px 0px -12% 0px', threshold: 0.15 });\n    document.querySelectorAll('[data-reveal]').forEach(el => this._io.observe(el));\n\n    this._demoStep = 0;\n    this._setDemoStep = step => {\n      const demo = document.querySelector('[data-orz-demo]');\n      if (!demo) return;\n      this._demoStep = Number(step);\n      demo.querySelectorAll('[data-demo-step]').forEach((button, index) => {\n        button.classList.toggle('is-active', index === this._demoStep);\n        button.classList.toggle('is-done', index < this._demoStep);\n        button.setAttribute('aria-selected', index === this._demoStep ? 'true' : 'false');\n      });\n      demo.querySelectorAll('[data-demo-panel]').forEach((panel, index) => {\n        panel.classList.toggle('is-active', index === this._demoStep);\n        panel.setAttribute('aria-hidden', index === this._demoStep ? 'false' : 'true');\n      });\n      const progress = demo.querySelector('.orz-demo-progress');\n      if (progress) progress.style.setProperty('--demo-progress', ((this._demoStep + .5) * 25) + '%');\n      const count = demo.querySelector('[data-demo-count]');\n      if (count) count.textContent = (this._demoStep + 1) + ' / 4';\n    };\n    this._demoAuto = !window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this._demoButtons = Array.from(document.querySelectorAll('[data-demo-step]'));\n    this._demoButtons.forEach(button => button.addEventListener('click', () => {\n      this._setDemoStep(button.getAttribute('data-demo-step'));\n      this._demoAuto = false;\n      const mode = document.querySelector('[data-demo-mode]');\n      if (mode) mode.textContent = 'PAUSED · CLICK ANY PHASE TO INSPECT';\n      clearInterval(this._demoTimer);\n      if (this._demoAuto) this._demoTimer = setInterval(() => this._setDemoStep((this._demoStep + 1) % 4), 4200);\n    }));\n    if (this._demoAuto) {\n      this._demoTimer = setInterval(() => this._setDemoStep((this._demoStep + 1) % 4), 4200);\n    }\n\n    this._optButtons = Array.from(document.querySelectorAll('[data-opt-toggle]'));\n    this._optButtons.forEach(button => button.addEventListener('click', () => {\n      const enabled = button.getAttribute('aria-pressed') === 'true';\n      button.setAttribute('aria-pressed', enabled ? 'false' : 'true');\n      button.textContent = enabled ? 'OFF' : 'ON';\n      const card = button.closest('.orz-opt-card');\n      if (card) card.classList.toggle('is-off', enabled);\n      this._demoAuto = false;\n      clearInterval(this._demoTimer);\n      const mode = document.querySelector('[data-demo-mode]');\n      if (mode) mode.textContent = 'PAUSED · CLICK A STEP TO CONTINUE';\n    }));\n\n    this._sharedSlider = document.querySelector('[data-shared-slider]');\n    this._setAToggle = document.querySelector('[data-set-a-toggle]');\n    this._setBToggle = document.querySelector('[data-set-b-toggle]');\n    this._setAPct = 10;\n    this._setBPct = 5;\n    this._setALive = true;\n    this._setBLive = false;\n    this._selectedSet = 'a';\n    this._selectSet = key => {\n      this._selectedSet = key;\n      this._syncRollout();\n      this._demoAuto = false;\n      clearInterval(this._demoTimer);\n    };\n    this._syncRollout = () => {\n      const liveA = this._setALive ? this._setAPct : 0;\n      const liveB = this._setBLive ? this._setBPct : 0;\n      const controlPct = Math.max(0, 100 - liveA - liveB);\n      const setAValue = document.querySelector('[data-set-a-value]');\n      if (setAValue) setAValue.textContent = this._setALive ? this._setAPct + '%' : 'off';\n      const setBValue = document.querySelector('[data-set-b-value]');\n      if (setBValue) setBValue.textContent = this._setBLive ? this._setBPct + '%' : 'shadow';\n      const control = document.querySelector('[data-control-value]');\n      if (control) control.textContent = controlPct + '%';\n      const card = document.querySelector('[data-rollout-card]');\n      if (card) {\n        card.style.setProperty('--set-a', liveA + '%');\n        card.style.setProperty('--set-b', liveB + '%');\n      }\n      const selectedA = this._selectedSet === 'a';\n      const selectedLive = selectedA ? this._setALive : this._setBLive;\n      const selectedPct = selectedA ? this._setAPct : this._setBPct;\n      const otherPct = selectedA ? liveB : liveA;\n      const sharedLabel = document.querySelector('[data-shared-label]');\n      if (sharedLabel) sharedLabel.textContent = 'Set ' + this._selectedSet.toUpperCase() + ' rollout';\n      const sharedValue = document.querySelector('[data-shared-value]');\n      if (sharedValue) sharedValue.textContent = selectedLive ? selectedPct + '%' : '—';\n      if (this._sharedSlider) {\n        this._sharedSlider.value = String(selectedPct);\n        this._sharedSlider.max = String(100 - otherPct);\n        this._sharedSlider.disabled = !selectedLive;\n      }\n      const sharedControl = document.querySelector('[data-shared-control]');\n      if (sharedControl) sharedControl.classList.toggle('is-disabled', !selectedLive);\n      const setARow = document.querySelector('[data-set-a-row]');\n      if (setARow) {\n        setARow.classList.toggle('is-live', this._setALive);\n        setARow.classList.toggle('is-off', !this._setALive);\n        setARow.classList.toggle('is-selected', selectedA);\n      }\n      const setBRow = document.querySelector('[data-set-b-row]');\n      if (setBRow) {\n        setBRow.classList.toggle('is-live', this._setBLive);\n        setBRow.classList.toggle('is-shadow', !this._setBLive);\n        setBRow.classList.toggle('is-selected', !selectedA);\n      }\n      if (this._setAToggle) {\n        this._setAToggle.textContent = this._setALive ? 'LIVE' : 'OFF';\n        this._setAToggle.setAttribute('aria-pressed', this._setALive ? 'true' : 'false');\n      }\n      if (this._setBToggle) {\n        this._setBToggle.textContent = this._setBLive ? 'LIVE' : 'BRING LIVE';\n        this._setBToggle.setAttribute('aria-pressed', this._setBLive ? 'true' : 'false');\n      }\n    };\n    document.querySelectorAll('[data-set-select]').forEach(row => {\n      row.addEventListener('click', () => this._selectSet(row.getAttribute('data-set-select')));\n      row.addEventListener('keydown', event => {\n        if (event.key === 'Enter' || event.key === ' ') {\n          event.preventDefault();\n          this._selectSet(row.getAttribute('data-set-select'));\n        }\n      });\n    });\n    if (this._sharedSlider) this._sharedSlider.addEventListener('input', event => {\n      const pct = Number(event.target.value);\n      if (this._selectedSet === 'a') this._setAPct = Math.min(pct, 100 - (this._setBLive ? this._setBPct : 0));\n      else this._setBPct = Math.min(pct, 100 - (this._setALive ? this._setAPct : 0));\n      this._syncRollout();\n      this._demoAuto = false;\n      clearInterval(this._demoTimer);\n    });\n    if (this._setAToggle) this._setAToggle.addEventListener('click', () => {\n      this._setALive = !this._setALive;\n      this._selectedSet = 'a';\n      if (this._setALive) this._setAPct = Math.min(this._setAPct || 5, 100 - (this._setBLive ? this._setBPct : 0));\n      this._syncRollout();\n      this._demoAuto = false;\n      clearInterval(this._demoTimer);\n    });\n    if (this._setBToggle) this._setBToggle.addEventListener('click', () => {\n      this._setBLive = !this._setBLive;\n      this._selectedSet = 'b';\n      if (this._setBLive) this._setBPct = Math.min(this._setBPct || 5, 100 - (this._setALive ? this._setAPct : 0));\n      this._syncRollout();\n      this._demoAuto = false;\n      clearInterval(this._demoTimer);\n    });\n    this._syncRollout();\n  }\n\n  componentWillUnmount() {\n    if (this._io) this._io.disconnect();\n    if (this._demoTimer) clearInterval(this._demoTimer);\n  }\n\n  stackDefs = [\n    { key: 'context_pruning', name: 'context_pruning', desc: 'Stale context stripped before each call', pct: 12 },\n    { key: 'plan_cache', name: 'plan_cache', desc: 'Compiled plans for repetitive steps', pct: 18 },\n    { key: 'step_routing', name: 'step_routing', desc: 'Routine steps go to small models', pct: 15 },\n    { key: 'distilled_expert', name: 'distilled_expert', desc: 'Fine-tuned on your traces, owned by you', pct: 25 }\n  ];\n\n  renderVals() {\n    const modeStyles = {\n      live:   { label: 'live',   color: '#f4f3ee', bg: '#10756e', border: '#10756e' },\n      shadow: { label: 'shadow', color: '#6f6857', bg: '#e6e3db', border: '#cfcabf' },\n      off:    { label: 'off',    color: '#a8a08c', bg: 'transparent', border: '#d0ccc1' }\n    };\n    const order = ['off', 'shadow', 'live'];\n    const stack = this.state.stack;\n    const stackOpts = this.stackDefs.map(d => {\n      const mode = stack[d.key];\n      const ms = modeStyles[mode];\n      return {\n        ...d,\n        pctLabel: '\\u2212' + d.pct + '%',\n        modeLabel: ms.label, modeColor: ms.color, modeBg: ms.bg, modeBorder: ms.border,\n        rowOpacity: mode === 'off' ? 0.45 : 1,\n        onToggle: () => this.setState(s => ({\n          stack: { ...s.stack, [d.key]: order[(order.indexOf(s.stack[d.key]) + 1) % 3] }\n        }))\n      };\n    });\n    const livePct = this.stackDefs.reduce((a, d) => a + (stack[d.key] === 'live' ? d.pct : 0), 0);\n    const shadowPct = this.stackDefs.reduce((a, d) => a + (stack[d.key] === 'shadow' ? d.pct : 0), 0);\n\n    const headline = this.props.headline ?? 'frontier-twice';\n    const fmt = n => '$' + Math.round(n).toLocaleString('en-US');\n    const bill = this.state.bill;\n    const savePct = 0.67; // illustrative, from published research\n    const gross = bill * savePct;\n    const fee = gross * 0.15;\n    return {\n      isHeadA: headline === 'frontier-twice',\n      isHeadB: headline === 'margin-traces',\n      isHeadC: headline === 'resolve-fix',\n      billFmt: fmt(bill),\n      billVal: bill,\n      onBill: e => this.setState({ bill: Number(e.target.value) }),\n      grossFmt: fmt(gross),\n      feeFmt: fmt(fee),\n      netFmt: fmt(gross - fee),\n      newBillFmt: fmt(bill - gross + fee),\n      stackOpts,\n      stackLive: '\\u2212' + livePct + '%',\n      stackShadow: shadowPct > 0 ? '\\u2212' + shadowPct + '% more pending in shadow' : 'nothing pending in shadow',\n      stackTicket: '$0.42 \\u2192 $' + (0.42 * (1 - livePct / 100)).toFixed(2) + ' per task'\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
